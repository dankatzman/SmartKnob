[platformio]
default_envs = uno

[env]
framework = arduino
monitor_speed = 57600


lib_deps = marcoschwartz/LiquidCrystal_I2C

[env:uno]
platform = atmelavr
board = uno
upload_port = COM12
monitor_port = COM12

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
upload_port = COM12
monitor_port = COM12

[env:nanoatmega328old]
platform = atmelavr
board = nanoatmega328oldsma
upload_port = COM12
monitor_port = COM12